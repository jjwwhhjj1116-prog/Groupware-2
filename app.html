<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CON-COST Works - Workspace</title>
  <!-- CSS Stylesheets -->
  <link rel="stylesheet" href="styles/brand.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/components.css">
</head>
<body>
  <div class="app-container">
    
    <!-- 1단: 최좌측 슬랙형 워크스페이스 & 기능 숏컷 바 (Dock) -->
    <aside class="app-dock">
      <div class="dock-top">
        <!-- 슬랙 스타일 워크스페이스 토글 (CON-COST ⇄ Viet QS) -->
        <div class="dock-logo-wrap active" id="dockLogoBtn" title="클릭하여 회사 법인 스위칭">
          <img class="dock-logo-img" id="dockLogoImg" src="assets/logo-concost-vertical.png" alt="Workspace Logo">
        </div>
        
        <!-- 서비스 숏컷 목록 (네이버웍스 구성) -->
        <nav class="dock-nav">
          <a class="dock-item active" href="#home" data-tooltip="🏠 홈 (대시보드)">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          </a>
          <a class="dock-item" href="#chat" data-tooltip="💬 메시지 (채팅)">
            <span class="dock-badge">3</span>
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          </a>
          <a class="dock-item" href="#mail" data-tooltip="📧 메일">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          </a>
          <a class="dock-item" href="#calendar" data-tooltip="📅 캘린더">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          </a>
          <a class="dock-item" href="#todo" data-tooltip="✅ 할 일">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          </a>
          <a class="dock-item" href="#board" data-tooltip="📋 게시판">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          </a>
          <a class="dock-item" href="#meet" data-tooltip="📹 화상회의">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 7a2 2 0 0 0-2.45-1.45L16 7V5a2 2 0 0 0-2-2H2a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2l4.55 1.45A2 2 0 0 0 23 17V7z"/></svg>
          </a>
          <a class="dock-item" href="#org" data-tooltip="👥 주소록 (조직도)">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          </a>
          <a class="dock-item" href="#drive" data-tooltip="📁 드라이브">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
          </a>
          <a class="dock-item" href="#project" data-tooltip="📊 프로젝트">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>
          </a>
          <a class="dock-item" href="#ai" data-tooltip="🤖 AI RAG 서비스">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4"/><line x1="8" y1="16" x2="8" y2="16"/><line x1="16" y1="16" x2="16" y2="16"/></svg>
          </a>
        </nav>
      </div>

      <div class="dock-bottom">
        <!-- 다크모드 토글 -->
        <button class="dock-action-btn" id="darkModeToggle" title="다크 모드 토글">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
        </button>

        <!-- 설정 버튼 -->
        <button class="dock-action-btn" id="settingsBtn" title="Gemini API Key 설정">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>

        <!-- 회사 법인 스위칭 토글 -->
        <div class="dock-company-toggle" id="companyToggleSwitch" title="법인 즉시 스위칭">
          <div class="dock-company-toggle-handle"></div>
        </div>

        <!-- 로그아웃용 아바타 -->
        <div class="dock-action-btn" id="userProfileBtn" title="로그아웃 클릭" style="background-color: var(--theme-color); color:#FFFFFF; font-weight:800; font-size:13px; border:1px solid rgba(255,255,255,0.2);">
          유
        </div>
      </div>
    </aside>

    <!-- 2단: 서브 리스트 패널 (Sub-panel) -->
    <aside class="app-subpanel" id="appSubPanel">
      <!-- 동적 서비스 메뉴 렌더링 -->
    </aside>

    <!-- 3단: 메인 뷰포트 (Main) -->
    <main class="app-main">
      <div class="app-titlebar">
        <div class="titlebar-drag-region" id="titleBarCompanyLabel">
          CON-COST Works v2 (한국 본사)
        </div>
        <div class="titlebar-controls">
          <span class="titlebar-btn minimize"></span>
          <span class="titlebar-btn maximize"></span>
          <span class="titlebar-btn close" id="titlebarCloseAction" title="프로그램 종료"></span>
        </div>
      </div>

      <div class="main-viewport" id="mainContent">
        <!-- SPA 렌더 영역 -->
      </div>
    </main>

    <!-- 4단: 우측 플로팅 로봇 AI 챗봇 버튼 & 위젯 (은행 앱 디자인) -->
    <div class="ai-floating-trigger" id="aiFloatingBtn" title="AI 어시스턴트 상담 열기">
      <!-- 로봇 얼굴 SVG -->
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4"/><line x1="8" y1="16" x2="8" y2="16"/><line x1="16" y1="16" x2="16" y2="16"/></svg>
    </div>

    <div class="ai-floating-widget" id="aiFloatingWidget">
      <div class="ai-widget-header">
        <div style="display:flex; align-items:center; gap:8px;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4"/></svg>
          <strong style="font-size:13.5px;">CC AI 비서</strong>
        </div>
        <button id="aiWidgetCloseBtn" style="background:none; border:none; color:white; font-size:20px; cursor:pointer; font-weight:bold;">&times;</button>
      </div>
      <div class="ai-widget-body" id="aiWidgetMessageArea">
        <div class="chat-message-row">
          <div class="chat-avatar-circle" style="background-color:#1E2022; color:#FFFFFF;">AI</div>
          <div class="chat-message-content">
            <span class="chat-sender-name">AI 비서</span>
            <div class="chat-bubble-wrapper">
              <div class="chat-bubble bot" style="background-color: var(--surface);">
                안녕하세요, 유종욱 실장님.  
                사내 지식정보 RAG 조회 비서 'CC AI 비서'입니다.  
                <br><br>
                ⚙️ **설정**에서 구글 Gemini API Key를 저장하시면 양사 임직원 실시간 검색이 활성화됩니다.
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="ai-widget-footer">
        <input type="text" class="ai-input" id="aiWidgetInput" style="font-size:12.5px;" placeholder="AI에게 질문을 남겨보세요..." onkeydown="if(event.key==='Enter') sendFloatingWidgetMessage()">
        <button class="btn btn-primary" style="padding: 6px 12px; border-radius: 999px;" onclick="sendFloatingWidgetMessage()">전송</button>
      </div>
    </div>

    <!-- API Key 설정 모달 백드롭 -->
    <div class="modal-backdrop" id="settingsModal">
      <div class="modal">
        <div class="modal-head">
          <h2>⚙️ Google Gemini 3.5 Flash 환경 설정</h2>
          <button class="close" onclick="closeSettingsModal()">&times;</button>
        </div>
        <div class="modal-body" style="display:flex; flex-direction:column; gap:16px;">
          <div class="form-field">
            <label for="geminiApiKeyInput">Gemini 3.5 Flash API Key</label>
            <input type="password" id="geminiApiKeyInput" class="form-input" placeholder="Gemini 3.5 Flash API Key를 입력하세요">
          </div>
          <div class="notice">
            💡 입력된 API Key는 브라우저 보안 로컬 스토리지에 저장되어 Gemini 3.5 Flash RAG 엔진 호출에 직접 사용됩니다.
          </div>
          <div style="display:flex; justify-content:flex-end; gap:8px;">
            <button class="btn btn-line" onclick="closeSettingsModal()">취소</button>
            <button class="btn btn-primary" onclick="saveSettings()">설정 저장</button>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- 토스트 알림 -->
  <div class="toast" id="toast">알림 메시지</div>

  <!-- Script Modules -->
  <script src="scripts/org-hr-card-data-core.js"></script>
  <script src="scripts/store.js"></script>
  <script src="scripts/auth.js"></script>
  <script src="scripts/router.js"></script>
  <script src="scripts/org-hr-card-system.js"></script>
  <script src="scripts/org-chart.js"></script>

  <script>
    // 1. 세션 및 스토어 초기화
    window.appAuth.checkSession();
    window.appStore.initStore();

    document.addEventListener("DOMContentLoaded", () => {
      const state = window.appStore.state;
      const user = state.currentUser;

      if (user) {
        document.getElementById("userProfileBtn").textContent = user.name[0];
      }

      // 다크모드 토글
      document.getElementById("darkModeToggle").addEventListener("click", () => {
        window.appStore.setDarkMode(!window.appStore.state.darkMode);
      });

      // 회사 UI 업데이트 헬퍼
      function updateCompanyUI(company) {
        const logoImg = document.getElementById("dockLogoImg");
        const titleLabel = document.getElementById("titleBarCompanyLabel");

        if (company === "Viet QS") {
          logoImg.src = "assets/logo-vietqs.png";
          titleLabel.textContent = "Viet QS Works v2 (베트남 지사)";
          document.getElementById("dockLogoBtn").classList.add("active");
        } else {
          logoImg.src = "assets/logo-concost-vertical.png";
          titleLabel.textContent = "CON-COST Works v2 (한국 본사)";
          document.getElementById("dockLogoBtn").classList.add("active");
        }
      }

      // 회사 전환 제어
      const companySwitch = document.getElementById("companyToggleSwitch");
      companySwitch.addEventListener("click", () => {
        const nextCompany = window.appStore.state.currentCompany === "CON-COST" ? "Viet QS" : "CON-COST";
        window.appStore.setCurrentCompany(nextCompany);
        updateCompanyUI(nextCompany);
        showToast(`법인이 ${nextCompany}(으)로 전환되었습니다.`);
        
        if (location.hash === "#org" && typeof window.initOrgChartModule === "function") {
          window.initOrgChartModule();
        }
      });

      // 로고 클릭으로도 법인 전환 처리
      document.getElementById("dockLogoBtn").addEventListener("click", () => {
        companySwitch.click();
      });

      // 초기 법인 테마 동기화
      updateCompanyUI(window.appStore.state.currentCompany);

      // 설정 모달 열기
      document.getElementById("settingsBtn").addEventListener("click", () => {
        const modal = document.getElementById("settingsModal");
        document.getElementById("geminiApiKeyInput").value = window.appStore.getGeminiApiKey();
        modal.style.display = "flex";
        setTimeout(() => modal.classList.add("active"), 10);
      });

      // AI 플로팅 챗봇 위젯 토글
      const botBtn = document.getElementById("aiFloatingBtn");
      const botWidget = document.getElementById("aiFloatingWidget");
      const botClose = document.getElementById("aiWidgetCloseBtn");

      botBtn.addEventListener("click", () => {
        botWidget.classList.toggle("active");
        if (botWidget.classList.contains("active")) {
          document.getElementById("aiWidgetInput").focus();
        }
      });

      botClose.addEventListener("click", () => {
        botWidget.classList.remove("active");
      });

      // 로그아웃
      document.getElementById("userProfileBtn").addEventListener("click", () => {
        if (confirm("로그아웃 하시겠습니까?")) {
          window.appAuth.logout();
        }
      });

      // 종료
      document.getElementById("titlebarCloseAction").addEventListener("click", () => {
        if (confirm("CON-COST Works를 닫겠습니까?")) {
          window.appAuth.logout();
        }
      });

      // 토스트 메시지
      window.showToast = function(message) {
        const toast = document.getElementById("toast");
        if (!toast) return;
        toast.textContent = message;
        toast.classList.add("active");
        setTimeout(() => toast.classList.remove("active"), 2200);
      };

      // 4. 라우터 구동
      window.appRouter.initRouter();
    });

    // ⚙️ 설정 저장 로직
    function saveSettings() {
      const key = document.getElementById("geminiApiKeyInput").value.trim();
      window.appStore.setGeminiApiKey(key);
      closeSettingsModal();
      showToast("AI 환경 설정이 안전하게 저장되었습니다.");
    }

    function closeSettingsModal() {
      const modal = document.getElementById("settingsModal");
      if (modal) {
        modal.classList.remove("active");
        setTimeout(() => { modal.style.display = "none"; }, 200);
      }
    }

    // 🤖 실시간 Gemini API RAG 및 데모 응답 제어
    async function sendFloatingWidgetMessage() {
      const input = document.getElementById("aiWidgetInput");
      const text = input.value.trim();
      if (!text) return;

      appendFloatingMessage("mine", "유종욱", text);
      input.value = "";

      const apiKey = window.appStore.getGeminiApiKey();

      if (!apiKey) {
        // API Key가 없으면 시뮬레이션용 더미 작동
        setTimeout(() => {
          let reply = "Gemini 3.5 Flash API 환경설정이 되어 있지 않아 데모 모드로 대답합니다. 설정(⚙️)에서 API Key를 입력하시면 실제 AI RAG가 연동됩니다.<br><br>";
          if (text.includes("박용진") || text.includes("이메일")) {
            reply += "BIM파트 **박용진 수석**님의 이메일은 `yjpark@con-cost.com` 이며, 내선연락처는 `010-7700-7859` 입니다.";
          } else if (text.includes("CEO") || text.includes("대표")) {
            reply += "베트남 Viet QS 법인의 CEO는 **Hyun Dong Myung (현동명)** 대표님이며, 부사장은 **이원희** 님입니다.";
          } else if (text.includes("인원") || text.includes("명")) {
            const count = window.employees ? window.employees.length : 66;
            reply += `현재 등록된 양사 총 임직원은 **${count}명**입니다. (CON-COST: ${window.employees.filter(e=>e.company==='CON-COST').length}명 / Viet QS: ${window.employees.filter(e=>e.company==='Viet QS').length}명)`;
          } else {
            reply += "사내 임직원 검색에 대한 질문을 남겨보세요! 예: '박용진 이메일 찾아줘'";
          }
          appendFloatingMessage("bot", "AI 비서", reply);
        }, 700);
        return;
      }

      // 로딩 표시
      appendFloatingMessage("bot", "AI 비서", "⚡ 실시간 사내 RAG 분석 중입니다 (Gemini 3.5 Flash)...");

      // RAG 컨텍스트 결합 프롬프트 작성
      const context = `
너는 CON-COST 및 Viet QS의 통합 그룹웨어 "CON-COST Works"의 사내 RAG AI 비서이다.
아래의 사내 임직원(employees) 정보 및 회사 조직도 구조를 완벽히 숙지하고, 사용자의 질문에 한국어로 매우 친절하고 정확하게 답변해라.
정보를 제공할 때 해당 직원이 실존한다면 이름, 이메일, 연락처, 부서, 직급 등의 정보를 정확하게 매핑해서 알려주되, 평가(eval), 연봉, 주민등록번호, 계좌번호 등 민감한 정보는 절대로 노출하거나 언급하지 말고 비공개 원칙을 준수해라.

[사내 임직원(employees) 데이터베이스]:
${JSON.stringify(window.employees, null, 2)}

사용자 질문: ${text}
`;

      try {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
        const response = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            contents: [{ parts: [{ text: context }] }]
          })
        });

        const data = await response.json();
        
        // 로딩 메시지 지우기
        removeLastMessage();

        if (data.candidates && data.candidates[0].content.parts[0].text) {
          const rawText = data.candidates[0].content.parts[0].text;
          // 마크다운 형식 개행 변환
          const formatted = rawText.replace(/\n/g, "<br>").replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
          appendFloatingMessage("bot", "AI 비서", formatted);
        } else {
          appendFloatingMessage("bot", "AI 비서", "구글 Gemini 응답 구조 분석 실패. API Key 상태를 확인바랍니다.");
        }
      } catch (error) {
        removeLastMessage();
        console.error("Gemini API Error:", error);
        appendFloatingMessage("bot", "AI 비서", "네트워크 오류가 발생했습니다. API Key 만료 여부를 체크해 주세요.");
      }
    }

    function appendFloatingMessage(type, sender, text) {
      const area = document.getElementById("aiWidgetMessageArea");
      const date = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
      
      const html = `
        <div class="chat-message-row ${type === 'mine' ? 'mine' : ''}">
          ${type === 'mine' ? '' : '<div class="chat-avatar-circle" style="background-color:#1E2022; color:#FFFFFF;">AI</div>'}
          <div class="chat-message-content">
            ${type === 'mine' ? '' : `<span class="chat-sender-name">${sender}</span>`}
            <div class="chat-bubble-wrapper">
              <div class="chat-bubble ${type === 'mine' ? 'mine' : 'bot'}" style="background-color: ${type === 'mine' ? 'var(--theme-color)' : 'var(--surface)'}; color: ${type === 'mine' ? '#FFFFFF' : 'var(--text)'};">${text}</div>
              <span class="chat-message-time">${date}</span>
            </div>
          </div>
        </div>
      `;
      
      area.insertAdjacentHTML('beforeend', html);
      area.scrollTop = area.scrollHeight;
    }

    function removeLastMessage() {
      const area = document.getElementById("aiWidgetMessageArea");
      if (area.lastElementChild) {
        area.removeChild(area.lastElementChild);
      }
    }
  </script>
</body>
</html>
